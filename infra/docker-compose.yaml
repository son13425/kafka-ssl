services:

  backend1:
    build: ../backend
    container_name: backend1
    command: uvicorn main:app --host 0.0.0.0 --port 8800 --reload
    volumes:
      - ../backend:/app
      - ./files:/app/files
    env_file:
      - ../backend/.env.backend
    working_dir: /app/app

  backend2:
    build: ../backend
    container_name: backend2
    command: uvicorn main:app --host 0.0.0.0 --port 8800 --reload
    volumes:
      - ../backend:/app
      - ./files:/app/files
    env_file:
      - ../backend/.env.backend
    working_dir: /app/app

  frontend:
    build: ../frontend
    container_name: frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ../frontend:/app
      - /app/node_modules
    env_file:
      - ../frontend/.env.frontend
    depends_on:
      - backend1
      - backend2

  kafka-kraft-1:
    image: bitnamilegacy/kafka:3.4
    container_name: kafka-kraft-1
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    environment:
      # Настройки ноды 1
      - KAFKA_CFG_NODE_ID=1
      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9095,SSL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-kraft-1:9092,EXTERNAL://kafka-kraft-1:9095,SSL://kafka-kraft-1:9094
    env_file:
      - .env.kafka
    volumes:
      - kraft1_data:/bitnami/kafka
      - ./certs/kafka/kafka-kraft-1:/opt/kafka/certs:ro

  kafka-kraft-2:
    image: bitnamilegacy/kafka:3.4
    container_name: kafka-kraft-2
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    environment:
      - KAFKA_CFG_NODE_ID=2
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9096,SSL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-kraft-2:9092,EXTERNAL://kafka-kraft-2:9096,SSL://kafka-kraft-2:9094
    env_file:
      - .env.kafka
    volumes:
      - kraft2_data:/bitnami/kafka
      - ./certs/kafka/kafka-kraft-2:/opt/kafka/certs:ro

  kafka-kraft-3:
    image: bitnamilegacy/kafka:3.4
    container_name: kafka-kraft-3
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    environment:
      - KAFKA_CFG_NODE_ID=3
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9097,SSL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-kraft-3:9092,EXTERNAL://kafka-kraft-3:9097,SSL://kafka-kraft-3:9094
    env_file:
      - .env.kafka
    volumes:
      - kraft3_data:/bitnami/kafka
      - ./certs/kafka/kafka-kraft-3:/opt/kafka/certs:ro

  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: schema-registry
    depends_on:
      - kafka-kraft-1
      - kafka-kraft-2
      - kafka-kraft-3
    restart: unless-stopped
    env_file:
      - .env.kafka

  # UI для KRaft кластера
  kafka-ui-kraft:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-kraft
    depends_on:
      - kafka-kraft-1
      - kafka-kraft-2
      - kafka-kraft-3
      - schema-registry
    env_file:
      - .env.kafka

  nginx:
    image: nginx:1.21.3-alpine
    container_name: nginx
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./files:/var/html/files/
    restart: always
    depends_on:
      - backend1
      - backend2
      - frontend
      - kafka-ui-kraft

  cert-generator:
    image: ubuntu:22.04
    container_name: cert-generator
    volumes:
      - ./certs/kafka:/certs
      - ./scripts/generate-certs.sh:/generate-certs.sh
    entrypoint: ["/bin/bash", "/generate-certs.sh"]


volumes:
  kraft1_data:
  kraft2_data:
  kraft3_data:
