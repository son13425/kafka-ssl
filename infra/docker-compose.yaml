services:

  backend1:
    build: ../backend
    container_name: backend1
    command: uvicorn main:app --host 0.0.0.0 --port 8800 --reload
    volumes:
      - ../backend:/app
      - ./files:/app/files
    env_file:
      - ../backend/.env.backend
    working_dir: /app/app

  backend2:
    build: ../backend
    container_name: backend2
    command: uvicorn main:app --host 0.0.0.0 --port 8800 --reload
    volumes:
      - ../backend:/app
      - ./files:/app/files
    env_file:
      - ../backend/.env.backend
    working_dir: /app/app

  frontend:
    build: ../frontend
    container_name: frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ../frontend:/app
      - /app/node_modules
    env_file:
      - ../frontend/.env.frontend
    depends_on:
      - backend1
      - backend2

  kafka-kraft-1:
    image: bitnamilegacy/kafka:3.4
    container_name: kafka-kraft-1
    user: root
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "=== Содержимое /certs-source ==="
        ls -laR /certs-source/
        mkdir -p /bitnami/kafka/config/certs
        if [ -f /certs-source/kafka.keystore.jks ]; then
          cp /certs-source/kafka.keystore.jks /bitnami/kafka/config/certs/
          cp /certs-source/kafka.truststore.jks /bitnami/kafka/config/certs/
        elif [ -f /certs-source/kafka-kraft-1/kafka.keystore.jks ]; then
          cp /certs-source/kafka-kraft-1/kafka.keystore.jks /bitnami/kafka/config/certs/
          cp /certs-source/kafka-kraft-1/kafka.truststore.jks /bitnami/kafka/config/certs/
        else
          echo "ERROR: keystore not found in /certs-source"
          ls -laR /certs-source/
          exit 1
        fi
        chmod 644 /bitnami/kafka/config/certs/*
        chown -R 1001:root /bitnami/kafka/config/certs
        echo "=== Certs copied ==="
        ls -la /bitnami/kafka/config/certs/
        exec /opt/bitnami/scripts/kafka/entrypoint.sh /opt/bitnami/scripts/kafka/run.sh
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9095,SSL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-kraft-1:9092,EXTERNAL://kafka-kraft-1:9095,SSL://kafka-kraft-1:9094
    env_file:
      - .env.kafka
    volumes:
      - kraft1_data:/bitnami/kafka
      - ./certs/kafka:/certs-source:ro

  kafka-kraft-2:
    image: bitnamilegacy/kafka:3.4
    container_name: kafka-kraft-2
    user: root
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        mkdir -p /bitnami/kafka/config/certs
        if [ -f /certs-source/kafka.keystore.jks ]; then
          cp /certs-source/kafka.keystore.jks /bitnami/kafka/config/certs/
          cp /certs-source/kafka.truststore.jks /bitnami/kafka/config/certs/
        elif [ -f /certs-source/kafka-kraft-2/kafka.keystore.jks ]; then
          cp /certs-source/kafka-kraft-2/kafka.keystore.jks /bitnami/kafka/config/certs/
          cp /certs-source/kafka-kraft-2/kafka.truststore.jks /bitnami/kafka/config/certs/
        else
          echo "ERROR: keystore not found"
          ls -laR /certs-source/
          exit 1
        fi
        chmod 644 /bitnami/kafka/config/certs/*
        chown -R 1001:root /bitnami/kafka/config/certs
        exec /opt/bitnami/scripts/kafka/entrypoint.sh /opt/bitnami/scripts/kafka/run.sh
    environment:
      - KAFKA_CFG_NODE_ID=2
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9096,SSL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-kraft-2:9092,EXTERNAL://kafka-kraft-2:9096,SSL://kafka-kraft-2:9094
    env_file:
      - .env.kafka
    volumes:
      - kraft2_data:/bitnami/kafka
      - ./certs/kafka:/certs-source:ro

  kafka-kraft-3:
    image: bitnamilegacy/kafka:3.4
    container_name: kafka-kraft-3
    user: root
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        mkdir -p /bitnami/kafka/config/certs
        if [ -f /certs-source/kafka.keystore.jks ]; then
          cp /certs-source/kafka.keystore.jks /bitnami/kafka/config/certs/
          cp /certs-source/kafka.truststore.jks /bitnami/kafka/config/certs/
        elif [ -f /certs-source/kafka-kraft-3/kafka.keystore.jks ]; then
          cp /certs-source/kafka-kraft-3/kafka.keystore.jks /bitnami/kafka/config/certs/
          cp /certs-source/kafka-kraft-3/kafka.truststore.jks /bitnami/kafka/config/certs/
        else
          echo "ERROR: keystore not found"
          ls -laR /certs-source/
          exit 1
        fi
        chmod 644 /bitnami/kafka/config/certs/*
        chown -R 1001:root /bitnami/kafka/config/certs
        exec /opt/bitnami/scripts/kafka/entrypoint.sh /opt/bitnami/scripts/kafka/run.sh
    environment:
      - KAFKA_CFG_NODE_ID=3
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9097,SSL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-kraft-3:9092,EXTERNAL://kafka-kraft-3:9097,SSL://kafka-kraft-3:9094
    env_file:
      - .env.kafka
    volumes:
      - kraft3_data:/bitnami/kafka
      - ./certs/kafka:/certs-source:ro

  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: schema-registry
    depends_on:
      - kafka-kraft-1
      - kafka-kraft-2
      - kafka-kraft-3
    restart: unless-stopped
    env_file:
      - .env.kafka

  # UI для KRaft кластера
  kafka-ui-kraft:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-kraft
    depends_on:
      - kafka-kraft-1
      - kafka-kraft-2
      - kafka-kraft-3
      - schema-registry
    env_file:
      - .env.kafka

  nginx:
    image: nginx:1.21.3-alpine
    container_name: nginx
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./files:/var/html/files/
    restart: always
    depends_on:
      - backend1
      - backend2
      - frontend
      - kafka-ui-kraft

  cert-generator:
    build: ./scripts
    container_name: cert-generator
    volumes:
      - ./certs/kafka:/certs

volumes:
  kraft1_data:
  kraft2_data:
  kraft3_data:
